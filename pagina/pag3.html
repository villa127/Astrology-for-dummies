<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="fonts.css">
  <meta charset="UTF-8">
  <title>Astrology for Dummies</title>
</head>

<body>
  <div class="contenedor"> 
    <h3>¿Cuando naciste?</h3> 
    <h4 for="fecha">Selecciona tu fecha de nacimiento:</h4>
    <input type="date" id="fecha" class="fecha">
    <p id="resultado"></p> 
    <div class="botones">
      <a href="pag2.html">
        <button class="button">Volver atrás</button>
      </a>
      <button class="button" onclick="verSigno()">
        Ver tu signo
      </button>
    </div>
  </div>

  <script>
    function verSigno() {
      const fecha = document.getElementById("fecha").value;

      if (!fecha) {
        resultado.textContent = "Por favor selecciona una fecha.";
        return;
      }

      const f = new Date(fecha);
      const dia = f.getUTCDate();
      const mes = f.getUTCMonth() + 1; // Los meses van de 0 a 11 en JS

      let pagina = "";

      if ((mes == 3 && dia >= 21) || (mes == 4 && dia <= 19)) {
        pagina = "signos/aries.html";
      } else if ((mes == 4 && dia >= 20) || (mes == 5 && dia <= 20)) {
        pagina = "signos/tauro.html";
      } else if ((mes == 5 && dia >= 21) || (mes == 6 && dia <= 20)) {
        pagina = "signos/geminis.html";
      } else if ((mes == 6 && dia >= 21) || (mes == 7 && dia <= 22)) {
        pagina = "signos/cancer.html";
      } else if ((mes == 7 && dia >= 23) || (mes == 8 && dia <= 22)) {
        pagina = "signos/leo.html";
      } else if ((mes == 8 && dia >= 23) || (mes == 9 && dia <= 22)) {
        pagina = "signos/virgo.html";
      } else if ((mes == 9 && dia >= 23) || (mes == 10 && dia <= 22)) {
        pagina = "signos/libra.html";
      } else if ((mes == 10 && dia >= 23) || (mes == 11 && dia <= 21)) {
        pagina = "signos/escorpio.html";
      } else if ((mes == 11 && dia >= 22) || (mes == 12 && dia <= 21)) {
        pagina = "signos/sagitario.html";
      } else if ((mes == 12 && dia >= 22) || (mes == 1 && dia <= 19)) {
        pagina = "signos/capricornio.html";
      } else if ((mes == 1 && dia >= 20) || (mes == 2 && dia <= 18)) {
        pagina = "signos/acuario.html";
      } else if ((mes == 2 && dia >= 19) || (mes == 3 && dia <= 20)) {
        pagina = "signos/piscis.html";
      }
      console.log("Redirigiendo a:", pagina);
      if (pagina) {
        window.location.href = pagina;
      } else {
        alert("No se pudo determinar el signo.");
      }
    }
  </script>
</body>
</html>
